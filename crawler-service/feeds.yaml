# feeds.yaml — RSS feed configuration for crawler-service
#
# Each feed entry supports:
#   url:              RSS feed URL (required)
#   name:             Display name used as "source" in raw_news (required)
#   enabled:          true/false — skipped if false (default: true)
#   category_hint:    Optional hint to classifier (informational only)
#   include_keywords: If set, ONLY articles matching at least one keyword trigger alert
#                     Pipeline still processes all articles regardless.
#                     Case-insensitive substring match.
#   exclude_keywords: Articles matching any of these are NEVER alerted
#                     (applied after include_keywords; pipeline unaffected)
#
# Alert behavior:
#   - All articles flow through raw_news → processor → processed_news regardless
#   - "should_alert" field in processed_news is set True only when:
#       1. Feed has no include_keywords  (alert everything), AND
#       2. Article doesn't match any exclude_keywords
#     OR
#       1. Article matches at least one include_keywords, AND
#       2. Article doesn't match any exclude_keywords
#
# To silence all alerts from a feed: set enabled: true but include_keywords: []
#   and add a catch-all exclude_keywords. Or just set enabled: false to skip entirely.

feeds:

  - name: "VNExpress - Tin mới nhất"
    url: "https://vnexpress.net/rss/tin-moi-nhat.rss"
    enabled: true
    category_hint: "general"
    include_keywords: []   # empty = alert all (default behavior)
    exclude_keywords:
      - "quảng cáo"
      - "sponsored"

  - name: "VNExpress - Thời sự"
    url: "https://vnexpress.net/rss/thoi-su.rss"
    enabled: true
    category_hint: "politics"
    include_keywords: []
    exclude_keywords: []

  - name: "VNExpress - Thế giới"
    url: "https://vnexpress.net/rss/the-gioi.rss"
    enabled: true
    category_hint: "world"
    include_keywords: []
    exclude_keywords: []

  - name: "VNExpress - Kinh doanh"
    url: "https://vnexpress.net/rss/kinh-doanh.rss"
    enabled: true
    category_hint: "economy"
    include_keywords:
      - "chứng khoán"
      - "vn-index"
      - "lãi suất"
      - "ngân hàng"
      - "đầu tư"
      - "gdp"
      - "startup"
    exclude_keywords:
      - "thể thao"

  - name: "VNExpress - Công nghệ"
    url: "https://vnexpress.net/rss/khoa-hoc.rss"
    enabled: true
    category_hint: "technology"
    include_keywords:
      - "ai"
      - "trí tuệ nhân tạo"
      - "chatgpt"
      - "blockchain"
      - "chip"
      - "robot"
    exclude_keywords: []

  - name: "BBC World News"
    url: "https://feeds.bbci.co.uk/news/world/rss.xml"
    enabled: true
    category_hint: "world"
    include_keywords:
      - "ukraine"
      - "china"
      - "trump"
      - "ai"
      - "climate"
      - "economy"
      - "war"
    exclude_keywords: []

  # Example of a disabled feed — won't be crawled
  - name: "Reuters World"
    url: "https://feeds.reuters.com/Reuters/worldNews"
    enabled: false
    category_hint: "world"
    include_keywords: []
    exclude_keywords: []
