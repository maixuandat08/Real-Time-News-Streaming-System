# ─────────────────────────────────────────────────────────────────────────────
# Real-Time News Streaming System
# Phase 1 (default): kafka + crawler-service + telegram-service + processor-service
# Phase 2 opt:       + flink            (--profile flink)
# Phase 3 opt:       + minio + iceberg-rest + iceberg-writer + trino  (--profile storage)
# ─────────────────────────────────────────────────────────────────────────────

networks:
  news-net:
    driver: bridge

volumes:
  kafka-data:
  flink-checkpoints:
  minio-data:
  iceberg-rest-data:
  crawler-state:     # persistent URL state for live mode

services:

  # ───── KAFKA ─────────────────────────────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:latest
    platform: linux/arm64
    container_name: kafka
    hostname: kafka
    restart: unless-stopped
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9094
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,EXTERNAL://0.0.0.0:9093,CONTROLLER://0.0.0.0:9094
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://localhost:9093
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_NUM_PARTITIONS: 1
      KAFKA_LOG_RETENTION_HOURS: 24
      KAFKA_LOG_DIRS: /var/lib/kafka/data
    ports:
      - "9093:9093"   # accessible from host for debugging
    volumes:
      - kafka-data:/var/lib/kafka/data
    networks:
      - news-net

  # ───── KAFKA INIT (creates topics) ───────────────────────────────────────
  kafka-init:
    image: confluentinc/cp-kafka:latest
    platform: linux/arm64
    container_name: kafka-init
    depends_on:
      - kafka
    networks:
      - news-net
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        echo "Creating Kafka topics..."
        cub kafka-ready -b kafka:9092 1 60
        kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists \
          --topic raw_news --partitions 1 --replication-factor 1
        kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists \
          --topic processed_news --partitions 1 --replication-factor 1
        kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists \
          --topic iceberg_archive --partitions 1 --replication-factor 1
        echo "Topics created successfully."
        kafka-topics --bootstrap-server kafka:9092 --list
    restart: "no"

  # ───── CRAWLER SERVICE ────────────────────────────────────────────────────
  crawler-service:
    build:
      context: ./crawler-service
      dockerfile: Dockerfile
    platform: linux/arm64
    container_name: crawler-service
    hostname: crawler-service
    restart: unless-stopped
    depends_on:
      - kafka
    env_file:
      - .env
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_TOPIC: ${KAFKA_RAW_TOPIC:-raw_news}
      CRAWL_INTERVAL_SECONDS: ${CRAWL_INTERVAL_SECONDS:-60}
      CRAWLER_MODE: ${CRAWLER_MODE:-realtime}
      FEEDS_CONFIG_PATH: /app/feeds.yaml
      CRAWLER_STATE_FILE: /data/crawler_state.json
      CRAWLER_STATE_MAX_URLS: ${CRAWLER_STATE_MAX_URLS:-50000}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    volumes:
      - crawler-state:/data    # persistent URL dedup state (live mode)
    networks:
      - news-net
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ───── TELEGRAM SERVICE ───────────────────────────────────────────────────
  telegram-service:
    build:
      context: ./telegram-service
      dockerfile: Dockerfile
    platform: linux/arm64
    container_name: telegram-service
    hostname: telegram-service
    restart: unless-stopped
    depends_on:
      - kafka
    env_file:
      - .env
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      # Phase 1: reads raw_news. Phase 2: switch to processed_news via TELEGRAM_KAFKA_TOPIC.
      KAFKA_TOPIC: ${TELEGRAM_KAFKA_TOPIC:-raw_news}
      KAFKA_GROUP_ID: ${KAFKA_GROUP_ID:-telegram-consumer-group}
      # latest (default): never replay backlog on new group (realtime mode)
      # earliest: replay from beginning (use with backfill + telegram)
      KAFKA_AUTO_OFFSET_RESET: ${KAFKA_AUTO_OFFSET_RESET:-latest}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    networks:
      - news-net
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ───── PROCESSOR SERVICE (PHASE 2) ───────────────────────────────────────
  # Consumes raw_news → normalizes schema → publishes processed_news
  # Runs in the default stack — no profile needed.
  # telegram-service is unchanged; it still reads from TELEGRAM_KAFKA_TOPIC.
  processor-service:
    build:
      context: ./processor-service
      dockerfile: Dockerfile
    platform: linux/arm64
    container_name: processor-service
    hostname: processor-service
    restart: unless-stopped
    depends_on:
      - kafka
    env_file:
      - .env
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      PROCESSOR_INPUT_TOPIC: ${KAFKA_RAW_TOPIC:-raw_news}
      PROCESSOR_OUTPUT_TOPIC: ${KAFKA_PROCESSED_TOPIC:-processed_news}
      PROCESSOR_GROUP_ID: ${PROCESSOR_GROUP_ID:-processor-consumer-group}
      PROCESSOR_DEDUP_WINDOW: ${PROCESSOR_DEDUP_WINDOW:-10000}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    networks:
      - news-net
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"


  flink-jobmanager:
    image: flink:1.18-scala_2.12-java11
    platform: linux/amd64   # official Flink image is amd64; works on M-series via Rosetta
    container_name: flink-jobmanager
    hostname: flink-jobmanager
    restart: unless-stopped
    profiles: ["flink"]
    depends_on:
      - kafka
    command: jobmanager
    environment:
      - |
        FLINK_PROPERTIES=
        jobmanager.rpc.address: flink-jobmanager
        taskmanager.numberOfTaskSlots: 2
        parallelism.default: 1
        state.backend: filesystem
        state.checkpoints.dir: file:///opt/flink/checkpoints
    ports:
      - "8081:8081"   # Flink Web UI
    volumes:
      - flink-checkpoints:/opt/flink/checkpoints
    networks:
      - news-net

  flink-taskmanager:
    image: flink:1.18-scala_2.12-java11
    platform: linux/amd64
    container_name: flink-taskmanager
    hostname: flink-taskmanager
    restart: unless-stopped
    profiles: ["flink"]
    depends_on:
      - flink-jobmanager
    command: taskmanager
    environment:
      - |
        FLINK_PROPERTIES=
        jobmanager.rpc.address: flink-jobmanager
        taskmanager.numberOfTaskSlots: 2
        parallelism.default: 1
        state.backend: filesystem
        state.checkpoints.dir: file:///opt/flink/checkpoints
    volumes:
      - flink-checkpoints:/opt/flink/checkpoints
    networks:
      - news-net

  # ───── FLINK JOB SUBMITTER (PHASE 2) ─────────────────────────────────────
  flink-job:
    build:
      context: ./flink-job
      dockerfile: Dockerfile
    platform: linux/amd64
    container_name: flink-job
    hostname: flink-job
    restart: "no"
    profiles: ["flink"]
    depends_on:
      - flink-taskmanager
    env_file:
      - .env
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      FLINK_MASTER: flink-jobmanager:8081
    networks:
      - news-net

  minio:
    image: minio/minio:latest
    platform: linux/arm64
    container_name: minio
    hostname: minio
    restart: unless-stopped
    profiles: ["storage"]
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    ports:
      - "9000:9000"   # S3 API (boto3 / aws cli / mc)
      - "9001:9001"   # MinIO Console UI → http://localhost:9001
    volumes:
      - minio-data:/data
    networks:
      - news-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 5

  iceberg-rest:
    image: tabulario/iceberg-rest:1.6.0
    platform: linux/arm64
    container_name: iceberg-rest
    hostname: iceberg-rest
    user: "0:0"
    restart: unless-stopped
    profiles: ["storage"]
    depends_on:
      - minio
    environment:
      AWS_ACCESS_KEY_ID: ${MINIO_ACCESS_KEY:-minioadmin}
      AWS_SECRET_ACCESS_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      AWS_REGION: ${MINIO_REGION:-us-east-1}
      CATALOG_WAREHOUSE: ${ICEBERG_WAREHOUSE:-s3://news-archive/warehouse}
      CATALOG_IO__IMPL: org.apache.iceberg.aws.s3.S3FileIO
      CATALOG_S3_ENDPOINT: http://minio:9000
      CATALOG_S3_PATH__STYLE__ACCESS: "true"
      CATALOG_URI: jdbc:sqlite:file:/var/lib/iceberg-rest/catalog.db
    ports:
      - "8181:8181"
    volumes:
      - iceberg-rest-data:/var/lib/iceberg-rest
    networks:
      - news-net
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ───── ICEBERG WRITER (PHASE 3 — REAL STORAGE PATH) ───────────────────────
  # Consumes processed_news and appends to a real Iceberg table on MinIO.
  iceberg-writer:
    build:
      context: ./iceberg-writer
      dockerfile: Dockerfile
    platform: linux/arm64
    container_name: iceberg-writer
    hostname: iceberg-writer
    restart: unless-stopped
    profiles: ["storage"]
    depends_on:
      - kafka
      - minio
      - iceberg-rest
    env_file:
      - .env
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      ICEBERG_INPUT_TOPIC: ${KAFKA_PROCESSED_TOPIC:-processed_news}
      ICEBERG_GROUP_ID: ${ICEBERG_GROUP_ID:-iceberg-writer-group}
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      MINIO_REGION: ${MINIO_REGION:-us-east-1}
      MINIO_BUCKET: ${MINIO_BUCKET:-news-archive}
      ICEBERG_CATALOG_NAME: ${ICEBERG_CATALOG_NAME:-news}
      ICEBERG_REST_URI: ${ICEBERG_REST_URI:-http://iceberg-rest:8181}
      ICEBERG_WAREHOUSE: ${ICEBERG_WAREHOUSE:-s3://news-archive/warehouse}
      ICEBERG_NAMESPACE: ${ICEBERG_NAMESPACE:-news}
      ICEBERG_TABLE: ${ICEBERG_TABLE:-processed_news}
      ICEBERG_BATCH_SIZE: ${ICEBERG_BATCH_SIZE:-100}
      ICEBERG_BATCH_TIMEOUT: ${ICEBERG_BATCH_TIMEOUT:-60}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    networks:
      - news-net
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ───── TRINO (PHASE 3 — READS ICEBERG VIA REST CATALOG) ───────────────────
  trino:
    image: trinodb/trino:439
    platform: linux/amd64    # official image is amd64; works via Rosetta
    container_name: trino
    hostname: trino
    restart: unless-stopped
    profiles: ["storage"]
    depends_on:
      - minio
      - iceberg-rest
    ports:
      - "8080:8080"    # Trino Web UI + JDBC endpoint
    volumes:
      - ./trino/catalog:/etc/trino/catalog:ro
    networks:
      - news-net
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
